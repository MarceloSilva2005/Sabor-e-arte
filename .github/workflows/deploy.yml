name: Deploy site (GitHub Pages)

# Publica a pasta frontend/ no GitHub Pages a cada push na branch principal.
on:
  push:
    branches: ["main", "master"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Garante que só um deploy roda por vez.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Enviar a pasta frontend
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./frontend

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
